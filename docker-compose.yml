services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: interview-iq:local
    container_name: interview-iq
    ports:
      - '8787:8787'
    environment:
      NODE_ENV: production
      PORT: 8787
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      CLIENT_DIST_PATH: /app/client/dist
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8787/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
