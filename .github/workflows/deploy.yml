name: Deploy (Vercel)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required repo secrets:
#   VERCEL_TOKEN     - https://vercel.com/account/tokens
#   VERCEL_ORG_ID    - from `vercel pull` or project settings
#   VERCEL_PROJECT_ID- from project settings
# Required Vercel project env vars (set in the dashboard, NOT in repo):
#   GEMINI_API_KEY
#   GEMINI_MODEL (optional, defaults to gemini-2.0-flash)

jobs:
  deploy:
    name: Vercel ${{ github.event_name == 'push' && 'Production' || 'Preview' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
